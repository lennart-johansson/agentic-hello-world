<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hello World</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #0d1117;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .card {
      text-align: center;
      padding: 3rem 4rem;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    h1 {
      font-size: 3rem;
      color: #e6edf3;
      letter-spacing: -0.5px;
    }

    p {
      margin-top: 1rem;
      color: #8b949e;
      font-size: 1rem;
    }

    img {
      margin-top: 2rem;
      max-width: 100%;
      border-radius: 8px;
      width: 320px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hello, World!</h1>
    <p>An agentic hello world experiment.</p>
    <img src="giraffe.png" alt="A majestic giraffe" />
  </div>
</body>
</html>
